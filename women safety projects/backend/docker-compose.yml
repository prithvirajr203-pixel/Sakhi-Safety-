version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: sakhi-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: sakhi2024
      MONGO_INITDB_DATABASE: sakhi_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - sakhi-network

  redis:
    image: redis:7-alpine
    container_name: sakhi-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sakhi-network

  backend:
    build: .
    container_name: sakhi-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:sakhi2024@mongodb:27017/sakhi_db?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - sakhi-network

  nginx:
    image: nginx:alpine
    container_name: sakhi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - sakhi-network

volumes:
  mongodb_data:
  redis_data:


networks:
  sakhi-network:
    driver: bridge
